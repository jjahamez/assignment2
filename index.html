<body>
  <h1> Cubic Equation Calculator </h1>

  <p> Solve the roots of any Cubic Equation by entering the 4 values! (ax³ + bx² + cx + d)</p>

  <div class="form-container">
    <form id="cubic-form">
      <label for="a"> Enter A value: </label>
      <input type="text" id="a" name="a"> <br>
      <label for="b"> Enter B value: </label>
      <input type="text" id="b" name="b"> <br>
      <label for="c"> Enter C value: </label>
      <input type="text" id="c" name="c"> <br>
      <label for="d"> Enter D value: </label>
      <input type="text" id="d" name="d"> <br>
      <input type="submit" value="Calculate"> <br>

    </form>
  </div> 

  <div class="Results">
    <label for="p-value"> P Value </label>
    <input type="text" id="p-value" readonly /> <br>
    <label for="q-value"> Q Value </label>
    <input type="text" id="q-value" readonly /> <br>
    <label for="discriminant"> Discriminant </label>
    <input type="text" id="discriminant" readonly /> <br>
    <label for="root-1"> Root 1 </label>
    <input type="text" id="root-1" readonly /> <br>
    <label for="root-2"> Root 2 </label>
    <input type="text" id="root-2" readonly /> <br>
    <label for="root-3"> Root 3 </label>
    <input type="text" id="root-3" readonly /> <br>
  </div>

  <script src="src/main.ts"> </script>
